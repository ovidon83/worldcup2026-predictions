name: Sync WC Scores

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch & write scores
        env:
          FDAPI: ${{ secrets.FOOTBALL_API_KEY }}
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request

          FDAPI  = os.environ['FDAPI']
          SB_URL = os.environ['SB_URL']
          SB_KEY = os.environ['SB_KEY']

          # API name → app name
          NAMES = {
            'Bosnia-Herzegovina': 'Bosnia',
            'Cape Verde Islands': 'Cape Verde',
            'Congo DR':           'DR Congo',
            "Côte d'Ivoire":      'Ivory Coast',
            'Turkey':             'Türkiye',
            'United States':      'USA',
          }

          # Group stage lookup (hardcoded — stable team assignments)
          LOOKUP = {
            'Mexico|South Africa':1,'South Korea|Czechia':2,'Czechia|South Africa':3,
            'Mexico|South Korea':4,'Czechia|Mexico':5,'South Africa|South Korea':6,
            'Canada|Bosnia':7,'Qatar|Switzerland':8,'Switzerland|Bosnia':9,
            'Canada|Qatar':10,'Switzerland|Canada':11,'Bosnia|Qatar':12,
            'Brazil|Morocco':13,'Haiti|Scotland':14,'Scotland|Morocco':15,
            'Brazil|Haiti':16,'Scotland|Brazil':17,'Morocco|Haiti':18,
            'USA|Paraguay':19,'Australia|Türkiye':20,'USA|Australia':21,
            'Türkiye|Paraguay':22,'Türkiye|USA':23,'Paraguay|Australia':24,
            'Germany|Curaçao':25,'Ivory Coast|Ecuador':26,'Germany|Ivory Coast':27,
            'Ecuador|Curaçao':28,'Ecuador|Germany':29,'Curaçao|Ivory Coast':30,
            'Netherlands|Japan':31,'Sweden|Tunisia':32,'Netherlands|Sweden':33,
            'Tunisia|Japan':34,'Japan|Sweden':35,'Tunisia|Netherlands':36,
            'Belgium|Egypt':37,'Iran|New Zealand':38,'Belgium|Iran':39,
            'New Zealand|Egypt':40,'Egypt|Iran':41,'New Zealand|Belgium':42,
            'Spain|Cape Verde':43,'Saudi Arabia|Uruguay':44,'Spain|Saudi Arabia':45,
            'Uruguay|Cape Verde':46,'Cape Verde|Saudi Arabia':47,'Uruguay|Spain':48,
            'France|Senegal':49,'Iraq|Norway':50,'France|Iraq':51,
            'Norway|Senegal':52,'Norway|France':53,'Senegal|Iraq':54,
            'Argentina|Algeria':55,'Austria|Jordan':56,'Argentina|Austria':57,
            'Jordan|Algeria':58,'Algeria|Austria':59,'Jordan|Argentina':60,
            'Portugal|DR Congo':61,'Uzbekistan|Colombia':62,'Portugal|Uzbekistan':63,
            'Colombia|DR Congo':64,'Colombia|Portugal':65,'DR Congo|Uzbekistan':66,
            'England|Croatia':67,'Ghana|Panama':68,'England|Ghana':69,
            'Panama|Croatia':70,'Panama|England':71,'Croatia|Ghana':72,
          }

          # Dynamic KO lookup from wc26_k (matches resolve over time)
          # Format: (homeN, awayN) -> (match_id, swap_needed)
          req_ko = urllib.request.Request(
            f"{SB_URL}/rest/v1/wc26_store?key=eq.wc26_k&select=value",
            headers={'apikey': SB_KEY, 'Authorization': f'Bearer {SB_KEY}'}
          )
          try:
            with urllib.request.urlopen(req_ko) as resp:
              ko_rows = json.loads(resp.read())
            ko_data = ko_rows[0]['value'] if ko_rows else {}
          except Exception as e:
            print(f'KO load failed: {e}')
            ko_data = {}

          KO_LOOKUP = {}
          for stage_matches in (ko_data or {}).values():
            if not isinstance(stage_matches, list): continue
            for km in stage_matches:
              if not isinstance(km, dict): continue
              hN, aN = km.get('homeN'), km.get('awayN')
              mid = km.get('id')
              if not (hN and aN and mid): continue
              if hN == 'TBD' or aN == 'TBD': continue
              KO_LOOKUP[(hN, aN)] = (mid, False)
              KO_LOOKUP[(aN, hN)] = (mid, True)

          # --- fetch live scores (date window: yesterday → tomorrow) ---
          from datetime import datetime, timedelta, timezone
          today = datetime.now(timezone.utc).date()
          d_from = (today - timedelta(days=1)).isoformat()
          d_to   = (today + timedelta(days=7)).isoformat()
          req = urllib.request.Request(
            f'https://api.football-data.org/v4/competitions/WC/matches?dateFrom={d_from}&dateTo={d_to}',
            headers={'X-Auth-Token': FDAPI}
          )
          with urllib.request.urlopen(req) as resp:
            matches = json.loads(resp.read())['matches']

          # --- load current results from Supabase ---
          req2 = urllib.request.Request(
            f"{SB_URL}/rest/v1/wc26_store?key=eq.wc26_r&select=value",
            headers={'apikey': SB_KEY, 'Authorization': f'Bearer {SB_KEY}'}
          )
          with urllib.request.urlopen(req2) as resp:
            rows = json.loads(resp.read())
          results = rows[0]['value'] if rows else {}

          # --- apply updates ---
          print(f'API returned {len(matches)} matches in window. KO_LOOKUP has {len(KO_LOOKUP)} entries.')
          changed = False
          for m in matches:
            status = m['status']
            h = NAMES.get(m['homeTeam']['name'], m['homeTeam']['name'])
            a = NAMES.get(m['awayTeam']['name'], m['awayTeam']['name'])
            print(f'  {status}: {h} vs {a} utc={m.get("utcDate")} ft={m.get("score",{}).get("fullTime")} et={m.get("score",{}).get("extraTime")} pen={m.get("score",{}).get("penalties")} dur={m.get("score",{}).get("duration")} winner={m.get("score",{}).get("winner")}')
            if status not in ('FINISHED', 'IN_PLAY'):
              continue

            # Group lookup first
            mid = LOOKUP.get(f'{h}|{a}')
            swap = False
            if not mid:
              # KO lookup
              info = KO_LOOKUP.get((h, a))
              if info:
                mid, swap = info
            if not mid:
              print(f'    -> no match in LOOKUP/KO_LOOKUP')
              continue
            print(f'    -> matched id={mid} swap={swap}')
            key = str(mid)

            # Skip if admin manually overrode this result (API is unreliable on free tier for ET/pens)
            if results.get(key, {}).get('manual'):
              print(f'    -> skip: manual override in place for {key}')
              continue

            score = m.get('score') or {}
            duration = score.get('duration')  # REGULAR / EXTRA_TIME / PENALTY_SHOOTOUT

            if status == 'FINISHED':
              # For KO with ET, use the post-ET score; for pens, use pre-pens (extraTime or fullTime)
              ft = score.get('fullTime') or {}
              et = score.get('extraTime') or {}
              if et.get('home') is not None and et.get('away') is not None:
                sc_h, sc_a = et['home'], et['away']
              elif ft.get('home') is not None and ft.get('away') is not None:
                sc_h, sc_a = ft['home'], ft['away']
              else:
                continue
              if swap:
                sc_h, sc_a = sc_a, sc_h
              entry = {'home': sc_h, 'away': sc_a, 'status': 'FINISHED'}
              # Mark ET-or-pens matches so UI can show AET/PENS badge
              if duration in ('EXTRA_TIME','PENALTY_SHOOTOUT'):
                entry['et'] = True
              # If pens decided it, attach adv. Try multiple sources in order:
              # 1. score.winner   2. score.penalties (higher score = winner)   3. fullTime vs extraTime (free-tier puts pens-inclusive score in fullTime)
              if duration == 'PENALTY_SHOOTOUT':
                api_adv = None  # 'h' or 'a' from API perspective (before swap)
                winner = score.get('winner')
                if winner == 'HOME_TEAM': api_adv = 'h'
                elif winner == 'AWAY_TEAM': api_adv = 'a'
                if api_adv is None:
                  pens = score.get('penalties') or {}
                  if pens.get('home') is not None and pens.get('away') is not None:
                    api_adv = 'h' if pens['home'] > pens['away'] else 'a'
                if api_adv is None and ft.get('home') is not None and et.get('home') is not None:
                  # Free-tier quirk: fullTime carries pens-inclusive score; ET has pre-pens
                  if ft['home'] > ft['away']: api_adv = 'h'
                  elif ft['home'] < ft['away']: api_adv = 'a'
                if api_adv:
                  entry['adv'] = ('a' if api_adv == 'h' else 'h') if swap else api_adv
                else:
                  print(f'    !! PENALTY_SHOOTOUT but cannot determine adv for mid={mid}')
            else:  # IN_PLAY
              ht = (score.get('halfTime') or {})
              home_sc = ht.get('home') if ht.get('home') is not None else 0
              away_sc = ht.get('away') if ht.get('away') is not None else 0
              if swap:
                home_sc, away_sc = away_sc, home_sc
              entry = {'home': home_sc, 'away': away_sc, 'status': 'IN_PLAY'}
              cur = results.get(key, {})
              if cur.get('status') == 'FINISHED':
                continue

            if results.get(key) != entry:
              results[key] = entry
              changed = True

          if not changed:
            print('No changes.')
          else:
            body = json.dumps({'key': 'wc26_r', 'value': results,
                               'updated_at': __import__('datetime').datetime.utcnow().isoformat()+'Z'})
            req3 = urllib.request.Request(
              f"{SB_URL}/rest/v1/wc26_store",
              data=body.encode(),
              headers={
                'apikey': SB_KEY,
                'Authorization': f'Bearer {SB_KEY}',
                'Content-Type': 'application/json',
                'Prefer': 'resolution=merge-duplicates',
              },
              method='POST'
            )
            with urllib.request.urlopen(req3) as resp:
              print(f'Written {len(results)} results. Status: {resp.status}')
          EOF
