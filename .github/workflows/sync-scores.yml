name: Sync WC Scores

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch & write scores
        env:
          FDAPI: ${{ secrets.FOOTBALL_API_KEY }}
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request

          FDAPI  = os.environ['FDAPI']
          SB_URL = os.environ['SB_URL']
          SB_KEY = os.environ['SB_KEY']

          # API name → app name
          NAMES = {
            'Bosnia-Herzegovina': 'Bosnia',
            'Cape Verde Islands': 'Cape Verde',
            'Congo DR':           'DR Congo',
            "Côte d'Ivoire":      'Ivory Coast',
            'Turkey':             'Türkiye',
            'United States':      'USA',
          }

          # Group stage lookup (hardcoded — stable team assignments)
          LOOKUP = {
            'Mexico|South Africa':1,'South Korea|Czechia':2,'Czechia|South Africa':3,
            'Mexico|South Korea':4,'Czechia|Mexico':5,'South Africa|South Korea':6,
            'Canada|Bosnia':7,'Qatar|Switzerland':8,'Switzerland|Bosnia':9,
            'Canada|Qatar':10,'Switzerland|Canada':11,'Bosnia|Qatar':12,
            'Brazil|Morocco':13,'Haiti|Scotland':14,'Scotland|Morocco':15,
            'Brazil|Haiti':16,'Scotland|Brazil':17,'Morocco|Haiti':18,
            'USA|Paraguay':19,'Australia|Türkiye':20,'USA|Australia':21,
            'Türkiye|Paraguay':22,'Türkiye|USA':23,'Paraguay|Australia':24,
            'Germany|Curaçao':25,'Ivory Coast|Ecuador':26,'Germany|Ivory Coast':27,
            'Ecuador|Curaçao':28,'Ecuador|Germany':29,'Curaçao|Ivory Coast':30,
            'Netherlands|Japan':31,'Sweden|Tunisia':32,'Netherlands|Sweden':33,
            'Tunisia|Japan':34,'Japan|Sweden':35,'Tunisia|Netherlands':36,
            'Belgium|Egypt':37,'Iran|New Zealand':38,'Belgium|Iran':39,
            'New Zealand|Egypt':40,'Egypt|Iran':41,'New Zealand|Belgium':42,
            'Spain|Cape Verde':43,'Saudi Arabia|Uruguay':44,'Spain|Saudi Arabia':45,
            'Uruguay|Cape Verde':46,'Cape Verde|Saudi Arabia':47,'Uruguay|Spain':48,
            'France|Senegal':49,'Iraq|Norway':50,'France|Iraq':51,
            'Norway|Senegal':52,'Norway|France':53,'Senegal|Iraq':54,
            'Argentina|Algeria':55,'Austria|Jordan':56,'Argentina|Austria':57,
            'Jordan|Algeria':58,'Algeria|Austria':59,'Jordan|Argentina':60,
            'Portugal|DR Congo':61,'Uzbekistan|Colombia':62,'Portugal|Uzbekistan':63,
            'Colombia|DR Congo':64,'Colombia|Portugal':65,'DR Congo|Uzbekistan':66,
            'England|Croatia':67,'Ghana|Panama':68,'England|Ghana':69,
            'Panama|Croatia':70,'Panama|England':71,'Croatia|Ghana':72,
          }

          # Dynamic KO lookup from wc26_k (matches resolve over time)
          # Format: (homeN, awayN) -> (match_id, swap_needed)
          req_ko = urllib.request.Request(
            f"{SB_URL}/rest/v1/wc26_store?key=eq.wc26_k&select=value",
            headers={'apikey': SB_KEY, 'Authorization': f'Bearer {SB_KEY}'}
          )
          try:
            with urllib.request.urlopen(req_ko) as resp:
              ko_rows = json.loads(resp.read())
            ko_data = ko_rows[0]['value'] if ko_rows else {}
          except Exception as e:
            print(f'KO load failed: {e}')
            ko_data = {}

          KO_LOOKUP = {}
          for stage_matches in (ko_data or {}).values():
            if not isinstance(stage_matches, list): continue
            for km in stage_matches:
              if not isinstance(km, dict): continue
              hN, aN = km.get('homeN'), km.get('awayN')
              mid = km.get('id')
              if not (hN and aN and mid): continue
              if hN == 'TBD' or aN == 'TBD': continue
              KO_LOOKUP[(hN, aN)] = (mid, False)
              KO_LOOKUP[(aN, hN)] = (mid, True)

          # --- fetch live scores (date window: yesterday → tomorrow) ---
          from datetime import datetime, timedelta, timezone
          today = datetime.now(timezone.utc).date()
          d_from = (today - timedelta(days=1)).isoformat()
          d_to   = (today + timedelta(days=7)).isoformat()
          req = urllib.request.Request(
            f'https://api.football-data.org/v4/competitions/WC/matches?dateFrom={d_from}&dateTo={d_to}',
            headers={'X-Auth-Token': FDAPI}
          )
          with urllib.request.urlopen(req) as resp:
            matches = json.loads(resp.read())['matches']

          # --- load current results from Supabase ---
          req2 = urllib.request.Request(
            f"{SB_URL}/rest/v1/wc26_store?key=eq.wc26_r&select=value",
            headers={'apikey': SB_KEY, 'Authorization': f'Bearer {SB_KEY}'}
          )
          with urllib.request.urlopen(req2) as resp:
            rows = json.loads(resp.read())
          results = rows[0]['value'] if rows else {}

          # --- apply updates ---
          print(f'API returned {len(matches)} matches in window. KO_LOOKUP has {len(KO_LOOKUP)} entries.')
          changed = False
          for m in matches:
            status = m['status']
            h = NAMES.get(m['homeTeam']['name'], m['homeTeam']['name'])
            a = NAMES.get(m['awayTeam']['name'], m['awayTeam']['name'])
            print(f'  {status}: {h} vs {a} utc={m.get("utcDate")} ft={m.get("score",{}).get("fullTime")} et={m.get("score",{}).get("extraTime")} pen={m.get("score",{}).get("penalties")} dur={m.get("score",{}).get("duration")} winner={m.get("score",{}).get("winner")}')
            if status not in ('FINISHED', 'IN_PLAY'):
              continue

            # Group lookup first
            mid = LOOKUP.get(f'{h}|{a}')
            swap = False
            if not mid:
              # KO lookup
              info = KO_LOOKUP.get((h, a))
              if info:
                mid, swap = info
            if not mid:
              print(f'    -> no match in LOOKUP/KO_LOOKUP')
              continue
            print(f'    -> matched id={mid} swap={swap}')
            key = str(mid)

            # Skip if admin manually overrode this result (API is unreliable on free tier for ET/pens)
            if results.get(key, {}).get('manual'):
              print(f'    -> skip: manual override in place for {key}')
              continue

            score = m.get('score') or {}
            duration = score.get('duration')  # REGULAR / EXTRA_TIME / PENALTY_SHOOTOUT

            if status == 'FINISHED':
              # For KO with ET, use the post-ET score; for pens, use pre-pens (extraTime or fullTime)
              ft = score.get('fullTime') or {}
              et = score.get('extraTime') or {}
              if et.get('home') is not None and et.get('away') is not None:
                sc_h, sc_a = et['home'], et['away']
              elif ft.get('home') is not None and ft.get('away') is not None:
                sc_h, sc_a = ft['home'], ft['away']
              else:
                continue
              if swap:
                sc_h, sc_a = sc_a, sc_h
              entry = {'home': sc_h, 'away': sc_a, 'status': 'FINISHED'}
              # Mark ET-or-pens matches so UI can show AET/PENS badge
              if duration in ('EXTRA_TIME','PENALTY_SHOOTOUT'):
                entry['et'] = True
              # If pens decided it, attach adv. Try multiple sources in order:
              # 1. score.winner   2. score.penalties (higher score = winner)   3. fullTime vs extraTime (free-tier puts pens-inclusive score in fullTime)
              if duration == 'PENALTY_SHOOTOUT':
                api_adv = None  # 'h' or 'a' from API perspective (before swap)
                winner = score.get('winner')
                if winner == 'HOME_TEAM': api_adv = 'h'
                elif winner == 'AWAY_TEAM': api_adv = 'a'
                if api_adv is None:
                  pens = score.get('penalties') or {}
                  if pens.get('home') is not None and pens.get('away') is not None:
                    api_adv = 'h' if pens['home'] > pens['away'] else 'a'
                if api_adv is None and ft.get('home') is not None and et.get('home') is not None:
                  # Free-tier quirk: fullTime carries pens-inclusive score; ET has pre-pens
                  if ft['home'] > ft['away']: api_adv = 'h'
                  elif ft['home'] < ft['away']: api_adv = 'a'
                if api_adv:
                  entry['adv'] = ('a' if api_adv == 'h' else 'h') if swap else api_adv
                else:
                  print(f'    !! PENALTY_SHOOTOUT but cannot determine adv for mid={mid}')
            else:  # IN_PLAY
              ht = (score.get('halfTime') or {})
              home_sc = ht.get('home') if ht.get('home') is not None else 0
              away_sc = ht.get('away') if ht.get('away') is not None else 0
              if swap:
                home_sc, away_sc = away_sc, home_sc
              entry = {'home': home_sc, 'away': away_sc, 'status': 'IN_PLAY'}
              cur = results.get(key, {})
              if cur.get('status') == 'FINISHED':
                continue

            if results.get(key) != entry:
              results[key] = entry
              changed = True

          # --- MANUAL OVERRIDES (ground-truth from official sources) ---
          # For KO matches with ET / penalty shootouts, football-data.org's free tier is
          # unreliable (often reports 0-0 ET score, missing winner). Apply verified real-
          # world scores here. `manual: true` protects them from future sync overwrites.
          MANUAL_OVERRIDES = {
            # id 114: Australia 1-1 Egypt (AET) — Egypt won 4-2 on penalties (Jul 3)
            '114': {'home': 1, 'away': 1, 'status': 'FINISHED', 'et': True, 'adv': 'a', 'manual': True},
            # id 115: Argentina 3-2 Cape Verde (AET) — Argentina won in ET (Jul 3)
            '115': {'home': 3, 'away': 2, 'status': 'FINISHED', 'et': True, 'manual': True},
          }
          for k, v in MANUAL_OVERRIDES.items():
            if results.get(k) != v:
              results[k] = v
              changed = True
              print(f'  MANUAL OVERRIDE applied for id={k}: {v}')

          if not changed:
            print('No changes.')
          else:
            body = json.dumps({'key': 'wc26_r', 'value': results,
                               'updated_at': __import__('datetime').datetime.utcnow().isoformat()+'Z'})
            req3 = urllib.request.Request(
              f"{SB_URL}/rest/v1/wc26_store",
              data=body.encode(),
              headers={
                'apikey': SB_KEY,
                'Authorization': f'Bearer {SB_KEY}',
                'Content-Type': 'application/json',
                'Prefer': 'resolution=merge-duplicates',
              },
              method='POST'
            )
            with urllib.request.urlopen(req3) as resp:
              print(f'Written {len(results)} results. Status: {resp.status}')

          # ═══════════════════════════════════════════
          # AUTO-UNLOCK R16 when all R32 games are FINISHED
          # ═══════════════════════════════════════════

          # Fetch current stageConfig
          req_st = urllib.request.Request(
            f"{SB_URL}/rest/v1/wc26_store?key=eq.wc26_s&select=value",
            headers={'apikey': SB_KEY, 'Authorization': f'Bearer {SB_KEY}'}
          )
          with urllib.request.urlopen(req_st) as resp:
            st_rows = json.loads(resp.read())
          stage_cfg = st_rows[0]['value'] if st_rows else {}

          r16_already_open = stage_cfg.get('r16', {}).get('open')
          r32_matches = (ko_data or {}).get('r32', []) or []
          r32_playable = [m for m in r32_matches if isinstance(m, dict) and m.get('resolved') is not False and m.get('homeN') not in (None, 'TBD')]
          r32_all_done = len(r32_playable) == 16 and all(
            results.get(str(m['id']), {}).get('status') == 'FINISHED' for m in r32_playable
          )

          if r32_all_done and not r16_already_open:
            print('🔓 R32 complete — unlocking R16')

            # Determine winner of each R32 match
            r32_by_id = {m['id']: m for m in r32_playable}
            def winner_of(mid):
              m = r32_by_id.get(mid)
              r = results.get(str(mid), {})
              if not m or not r: return {'name':'TBD','flag':'🏳️'}
              h, a = r['home'], r['away']
              if h > a: return {'name': m['homeN'], 'flag': m['home']}
              if a > h: return {'name': m['awayN'], 'flag': m['away']}
              adv = r.get('adv')
              if adv == 'h': return {'name': m['homeN'], 'flag': m['home']}
              if adv == 'a': return {'name': m['awayN'], 'flag': m['away']}
              return {'name':'TBD','flag':'🏳️'}

            # R16 bracket (from KOT.r16 in the frontend)
            R16_TEMPLATE = [
              (201, 'W103', 'W105'),
              (202, 'W101', 'W109'),
              (203, 'W112', 'W111'),
              (204, 'W108', 'W106'),
              (205, 'W102', 'W113'),
              (206, 'W104', 'W107'),
              (207, 'W115', 'W114'),
              (208, 'W110', 'W116'),
            ]

            # Try to look up R16 kickoff times from the API (matches within window)
            def find_api_time(name_a, name_b):
              for m in matches:
                h = NAMES.get(m['homeTeam']['name'], m['homeTeam']['name']) if m['homeTeam']['name'] else None
                a = NAMES.get(m['awayTeam']['name'], m['awayTeam']['name']) if m['awayTeam']['name'] else None
                if h and a and {h, a} == {name_a, name_b}:
                  return m.get('utcDate')
              return None

            EDT = timezone(timedelta(hours=-4))
            MONS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']

            # Fallback times if API doesn't have R16 yet (best-effort estimates)
            FALLBACK_TIMES = {201:('Jul 4','16:00'),202:('Jul 4','20:00'),
                              203:('Jul 6','16:00'),204:('Jul 6','20:00'),
                              205:('Jul 5','16:00'),206:('Jul 5','20:00'),
                              207:('Jul 7','16:00'),208:('Jul 7','20:00')}

            r16_matches = []
            earliest_dt = None
            for mid, slotH, slotA in R16_TEMPLATE:
              hw = winner_of(int(slotH[1:]))
              aw = winner_of(int(slotA[1:]))
              utc_str = find_api_time(hw['name'], aw['name'])
              if utc_str:
                dt_utc = datetime.fromisoformat(utc_str.replace('Z','+00:00'))
                dt_et = dt_utc.astimezone(EDT)
                date_str = f"{MONS[dt_et.month-1]} {dt_et.day}"
                time_str = dt_et.strftime('%H:%M')
              else:
                date_str, time_str = FALLBACK_TIMES[mid]
                # Reconstruct UTC dt from fallback ET for deadline calc
                mon = MONS.index(date_str.split()[0]) + 1
                day = int(date_str.split()[1])
                hh, mm = [int(x) for x in time_str.split(':')]
                dt_et = datetime(2026, mon, day, hh, mm, tzinfo=EDT)
                dt_utc = dt_et.astimezone(timezone.utc)
              if earliest_dt is None or dt_utc < earliest_dt:
                earliest_dt = dt_utc
              r16_matches.append({
                'id': mid, 'stage': 'r16', 'round': 'Round of 16',
                'date': date_str, 'time': time_str,
                'slotHome': slotH, 'slotAway': slotA,
                'homeN': hw['name'], 'awayN': aw['name'],
                'home': hw['flag'], 'away': aw['flag'],
              })

            # Deadline: 1 hour before earliest R16 match
            deadline = earliest_dt - timedelta(hours=1)
            deadline_str = deadline.strftime('%Y-%m-%dT%H:%M:%S.000Z')

            # Update ko_data
            ko_data['r16'] = r16_matches
            body_k = json.dumps({'key':'wc26_k','value':ko_data}).encode()
            req_k = urllib.request.Request(f"{SB_URL}/rest/v1/wc26_store", data=body_k,
              headers={'apikey':SB_KEY,'Authorization':f'Bearer {SB_KEY}','Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
              method='POST')
            with urllib.request.urlopen(req_k) as r:
              print(f'  wc26_k updated (r16 populated). Status: {r.status}')

            # Update stageConfig
            stage_cfg['r16'] = {'open': True, 'deadline': deadline_str}
            body_s = json.dumps({'key':'wc26_s','value':stage_cfg}).encode()
            req_s = urllib.request.Request(f"{SB_URL}/rest/v1/wc26_store", data=body_s,
              headers={'apikey':SB_KEY,'Authorization':f'Bearer {SB_KEY}','Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
              method='POST')
            with urllib.request.urlopen(req_s) as r:
              print(f'  wc26_s updated (r16 open, deadline={deadline_str}). Status: {r.status}')

            # Post chat announcement
            req_c = urllib.request.Request(
              f"{SB_URL}/rest/v1/wc26_store?key=eq.wc26_chat&select=value",
              headers={'apikey': SB_KEY, 'Authorization': f'Bearer {SB_KEY}'}
            )
            with urllib.request.urlopen(req_c) as resp:
              c_rows = json.loads(resp.read())
            chat = c_rows[0]['value'] if c_rows else []
            deadline_display = deadline.astimezone(EDT).strftime('%b %d, %I:%M %p ET')
            chat_msg = {
              't': f'🔥 Round of 16 predictions are OPEN! First game is coming up. Deadline: {deadline_display}. Same rules as R32 — no draws allowed, exact 5 / winner+diff 3 / winner-only 2. Good luck!',
              'u': 'ovidon83',
              'ts': datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%S.') + f'{datetime.utcnow().microsecond//1000:03d}Z'
            }
            chat.append(chat_msg)
            body_ch = json.dumps({'key':'wc26_chat','value':chat}).encode()
            req_ch = urllib.request.Request(f"{SB_URL}/rest/v1/wc26_store", data=body_ch,
              headers={'apikey':SB_KEY,'Authorization':f'Bearer {SB_KEY}','Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
              method='POST')
            with urllib.request.urlopen(req_ch) as r:
              print(f'  Chat announcement posted. Status: {r.status}')
          elif r16_already_open:
            print('R16 already open — skip unlock')
          else:
            done_count = sum(1 for m in r32_playable if results.get(str(m['id']), {}).get('status') == 'FINISHED')
            print(f'R32 not complete yet ({done_count}/{len(r32_playable)} done) — R16 unlock waits')
          EOF
